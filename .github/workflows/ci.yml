name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege token: every job only reads the repo to build and test.
permissions:
  contents: read

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  Format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint

  Test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm test

  Build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          # Build only needs these to exist; real values are set in Cloudflare Pages.
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_ANON_KEY: ci-placeholder

  Functions:
    runs-on: ubuntu-latest
    # Run inside the functions dir: Deno only discovers deno.json (nodeModulesDir)
    # and deno.lock from the working directory upward, never from the path argument.
    defaults:
      run:
        working-directory: supabase/functions
    steps:
      - uses: actions/checkout@v7
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno test

  # Every merge to main auto-releases (see version.yml), so each PR must document
  # the version its merge will mint. Dependabot can't write changelog entries — its
  # PRs are exempt and get backfilled at ship time (see the ship skill).
  Changelog:
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full tags, needed to compute the next build number
      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
      - name: Verify CHANGELOG names the version this merge will mint
        run: |
          next=$(node scripts/next-version.mjs)
          echo "This merge will mint v${next}."
          if ! grep -qF "## [${next}]" CHANGELOG.md; then
            echo "::error file=CHANGELOG.md::CHANGELOG.md has no '## [${next}]' section. This merge releases v${next} — add its entry (the ship skill does this automatically via scripts/next-version.mjs)."
            exit 1
          fi
          echo "Found the '## [${next}]' section."
