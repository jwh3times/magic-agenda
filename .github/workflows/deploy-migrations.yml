name: Deploy Migrations

# Applies Supabase migrations to the production database automatically when a migration
# file changes on `main` (i.e. when a PR touching supabase/migrations/** is merged).
#
# Requires these repository secrets (Settings -> Secrets and variables -> Actions):
#   SUPABASE_ACCESS_TOKEN  - personal access token (Supabase dashboard -> Account -> Access Tokens)
#   SUPABASE_DB_PASSWORD   - the production database password
#   SUPABASE_PROJECT_ID    - the project ref (the <ref> in <ref>.supabase.co)
#
# `supabase db push` is idempotent: it only applies migrations not already recorded in the
# remote migration history, so re-runs and already-applied migrations are no-ops.

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
  workflow_dispatch:

# Least-privilege token: the job only checks out the repo; Supabase auth uses dedicated secrets.
permissions:
  contents: read

# Never let two deploys apply migrations concurrently; queue rather than cancel a push in flight.
concurrency:
  group: deploy-migrations
  cancel-in-progress: false

jobs:
  Deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v7
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: supabase link --project-ref "$SUPABASE_PROJECT_ID"
      - run: supabase db push
