name: Version

# Releases every merge to main with an auto-incrementing build number.
#
# On each push to main this reads the major/minor/build version from the package.json `version` field,
# computes the next build number for that major/minor line from the existing release tags, then pushes
# an annotated tag `v<major>.<minor>.<build>` (e.g. v1.2.7) and creates a GitHub Release.
#
# Why a release tag instead of committing a bump back to main:
#   - it works identically on protected branches (no bypass actor or bump-commit needed);
#   - it never re-triggers CI or needs [skip ci] loops;
#   - build numbers auto-increment for each major/minor line;
#   - when a new major/minor line starts, `x.y.0` is allowed and will not be forced to `x.y.1`.
#
# To see which release a checkout corresponds to: git describe --tags

on:
  push:
    branches: [main]

permissions:
  contents: write # required to push the release tag and create the GitHub Release

# Serialize runs so two closely-spaced merges cannot compute the same build number.
concurrency:
  group: version-main
  cancel-in-progress: false

jobs:
  release:
    name: Tag and release build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history + tags, needed to compute the next build number

      - name: Compute next build number and push tag
        id: version
        run: |
          version=$(jq -r .version package.json)
          if [[ ! "$version" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "::error::Version '$version' is not a plain major.minor.build semver."
            exit 1
          fi

          major="${BASH_REMATCH[1]}"
          minor="${BASH_REMATCH[2]}"
          requested_build="${BASH_REMATCH[3]}"
          series="${major}.${minor}"

          existing_tag=$(
            git tag --points-at "$GITHUB_SHA" --list "v${series}.*" |
              sed "s/^v${series}\.//" |
              awk -v prefix="v${series}." '/^[0-9]+$/ { print prefix $0 }' |
              sort -V |
              tail -1
          )

          if [[ -n "$existing_tag" ]]; then
            tag="$existing_tag"
            build="${tag##*.}"
          else
            last=$(
              git tag --list "v${series}.*" |
                sed "s/^v${series}\.//" |
                awk '/^[0-9]+$/' |
                sort -n |
                tail -1
            )

            if [[ -z "$last" ]]; then
              build="$requested_build"
            else
              next=$(( last + 1 ))
              if (( requested_build > next )); then
                build="$requested_build"
              else
                build="$next"
              fi
            fi

            tag="v${series}.${build}"
            if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
              echo "::error::Release tag '${tag}' already exists."
              exit 1
            fi

            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$tag" -m "Release ${tag}"
            git push origin "refs/tags/${tag}"
          fi

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "series=${series}" >> "$GITHUB_OUTPUT"
          echo "build=${build}" >> "$GITHUB_OUTPUT"
          {
            echo "### Release tagged: \`${tag}\`"
            echo ""
            echo "- Version from package.json: \`${version}\`"
            echo "- Major/minor line: \`${series}\`"
            echo "- Build number: \`${build}\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "Release ${{ steps.version.outputs.tag }} already exists."
            exit 0
          fi

          gh release create "${{ steps.version.outputs.tag }}" \
            --verify-tag \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes
