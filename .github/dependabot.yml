# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Minor/patch updates are grouped into a single PR per ecosystem to reduce noise;
# MAJOR bumps arrive individually — EXCEPT for peer-locked families where a lone
# bump would leave an unsatisfiable peer range. Those families travel together as
# one major PR.
version: 2
updates:
  # JavaScript / npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
      time: "05:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(dev-deps)"
    groups:
      # --- Peer-locked families: a lone major bump leaves an unsatisfiable peer
      #     range, so the family's majors must travel together as one PR. All
      #     minor/patch bumps already batch into the catch-all PR at the bottom,
      #     so these family groups are intentionally major-only. ---

      # react + react-dom ship in lockstep at identical versions and must match at
      # runtime; the @types/* packages track the same major.
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
        update-types:
          - "major"

      # @dnd-kit/sortable peer-requires @dnd-kit/core (^6.3.0), so the family moves
      # together — a core major strands sortable.
      dnd-kit:
        patterns:
          - "@dnd-kit/*"
        update-types:
          - "major"

      # @testing-library/react and user-event both peer-require @testing-library/dom,
      # the shared hub of this family.
      testing-library:
        patterns:
          - "@testing-library/*"
        update-types:
          - "major"

      # @eslint/js is lockstep-versioned with eslint; both plugins peer-cap on the
      # eslint major; typescript-eslint peer-bounds BOTH the eslint major and the
      # typescript range, so typescript rides along here.
      lint-and-typescript:
        patterns:
          - "eslint"
          - "@eslint/*"
          - "eslint-plugin-*"
          - "typescript-eslint"
          - "globals"
          - "typescript"
        update-types:
          - "major"

      # @vitejs/plugin-react requires a matching Vite major (plugin-react 6 needs
      # Vite 8); vitest tracks the Vite majors it supports.
      vite-ecosystem:
        patterns:
          - "vite"
          - "vitest"
          - "@vitejs/plugin-react"
          - "@vitest/*"
        update-types:
          - "major"

      # One PR for all remaining minor + patch bumps; ungrouped majors (e.g.
      # @supabase/supabase-js, react-router-dom, prettier, jsdom) open individually.
      npm-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions used in workflows (.github/workflows)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
      time: "05:00"
      timezone: "America/New_York"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"
    groups:
      actions-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
