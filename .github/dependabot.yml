# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  # JavaScript / npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(dev-deps)"
    groups:
      # Vite, Vitest and the React plugin are peer-locked — @vitejs/plugin-react
      # requires a matching Vite major (e.g. plugin-react 6 needs Vite 8), so a
      # bump to one alone leaves an unsatisfiable peer range. Group them (majors
      # included) so they always upgrade together as a single PR. Listed before
      # the catch-all below so these three are captured here first.
      vite-ecosystem:
        patterns:
          - "vite"
          - "vitest"
          - "@vitejs/plugin-react"
        update-types:
          - "major"
          - "minor"
          - "patch"
      # One PR for all remaining minor + patch bumps; other majors open individually for review.
      npm-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions used in workflows (.github/workflows)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    commit-message:
      prefix: "chore(ci)"
    groups:
      actions-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
